name: Build cal.com image

on:
  workflow_call:
  pull_request:
    types: [opened, synchronize]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit sha (short)
        run: echo "GIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ACTIONS_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions_sic-calcom_build

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --build-arg NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            --build-arg CALENDSO_ENCRYPTION_KEY="${{ secrets.CALENDSO_ENCRYPTION_KEY }}" \
            --build-arg NEXT_PUBLIC_WEBAPP_URL="https://cal.cogonation.com" \
            --build-arg NEXT_PUBLIC_API_V2_URL="https://cal.cogonation.com/api/v2" \
            --build-arg CALCOM_TELEMETRY_DISABLED="1" \
            --build-arg NEXT_PUBLIC_LICENSE_CONSENT="agree" \
            -t ${{ vars.ECR_REPO }}:${GIT_SHA} \
            .
          docker push ${{ vars.ECR_REPO }}:${GIT_SHA}

      - name: Terraform Init
        id: init
        run: terraform init -backend-config key=${{ vars.TF_STATE_KEY }}
        working-directory: terraform

      - name: Terraform plan
        id: plan
        run: terraform plan -var environment=prod -no-color
        working-directory: terraform
